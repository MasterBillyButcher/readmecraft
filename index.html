  <style>
    /* Critical above-fold CSS — prevents FOUC */
    *, *::before, *::after { box-sizing: border-box; }

    #root { min-height: 100vh; }
    /* Loading spinner shown before React hydrates */
    .preload {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #05070a; flex-direction: column; gap: 16px; z-index: 9999;
      transition: opacity .3s;
    }

      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #fff;
      box-shadow: 0 0 30px rgba(124,58,237,.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .preload-text { font-size: 13px; color: #6b7280; font-weight: 500; letter-spacing: .04em; }
    @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.06)} }

<body>
  <!-- Loading state (hidden once React mounts) -->
  <div class="preload" id="preload">
    <div class="preload-logo">✦</div>
    <div class="preload-text">ReadMeCraft is loading...</div>
  </div>

  <div id="root"></div>

  <script>
    // Remove preloader once React has mounted
    window.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('preload');
      setTimeout(() => { if(el){ el.style.opacity='0'; setTimeout(()=>el.remove(),300); } }, 400);
    });
  </script>
